name: MaceGuard
main: com.lincoln.maceguard.MaceGuardPlugin
version: 2.1.0
api-version: '1.21'
author: LincolnHenry
description: Zone protections, manual snapshot resets, End access controls, and End island combat/explosion restrictions.
softdepend: [WarzoneDuels]

commands:
  maceguard:
    description: MaceGuard admin command
    usage: /<command> reload|debug|here|clear [zone]|snapshot <zone>|reset <zone>|endeyes <on|off|at time>|endportal <on|off|at time>|endstatus
    permission: maceguard.reload

permissions:
  maceguard.reload:
    default: op
  maceguard.edit:
    default: op
